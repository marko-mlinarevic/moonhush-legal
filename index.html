<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MoonHush — Legal</title>
<style>
  :root { --bg:#fff; --text:#1a1c22; --muted:#5c6270; --accent:#5b6cff; --line:#e6e8ee; --band:#0A0E1F; }
  * { box-sizing:border-box; }
  body { margin:0; font:16px/1.65 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--text); background:var(--bg); }
  .band { background:var(--band); color:#ECEFF8; padding:36px 20px; }
  .band .wrap { max-width:680px; margin:0 auto; }
  .band h1 { margin:0; font-size:24px; letter-spacing:-0.3px; }
  .band .sub { color:#A9B8FF; font-size:13px; margin-top:6px; }
  main { max-width:680px; margin:0 auto; padding:32px 20px 64px; }
  .card { display:block; border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin-bottom:14px; text-decoration:none; color:var(--text); }
  .card:hover { border-color:var(--accent); }
  .card h2 { margin:0 0 4px; font-size:18px; }
  .card p { margin:0; color:var(--muted); font-size:14px; }
  footer { max-width:680px; margin:0 auto; padding:0 20px 48px; color:var(--muted); font-size:13px; }
</style>
</head>
<body>
  <div class="band"><div class="wrap"><h1>MoonHush</h1><div class="sub">Baby Sleep Sounds &amp; White Noise</div></div></div>
  <main>
    <a class="card" href="./privacy.html"><h2>Privacy Policy</h2><p>What data the app and its services use, and your choices.</p></a>
    <a class="card" href="./terms.html"><h2>Terms of Service</h2><p>The terms that govern your use of the app.</p></a>
  </main>
  <footer>© 2026 Marko Mlinarević · hello@draustudio.com</footer>
</body>
</html>
